services:
  hevy-sync:
    image: ghcr.io/lucasgirod/hevy_sync:latest
    pull_policy: always
    command: ["hevy-sync-service"]
    environment:
      - TZ=${TZ:-Europe/Zurich}
      - HEVY_API_KEY=${HEVY_API_KEY:?err}
      - GARMIN_USERNAME=${GARMIN_USERNAME:?err}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD:?err}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SYNC_LIMIT=${SYNC_LIMIT:-10}
      - SYNC_FETCH_ALL=${SYNC_FETCH_ALL:-false}
      - SYNC_SINCE=${SYNC_SINCE:-}
      - SKIP_EXISTING=${SKIP_EXISTING:-true}
      - "SYNC_CRON=${SYNC_CRON:-0 9,20 * * *}"
      - RUN_ON_START=${RUN_ON_START:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - WEBHOOK_PATH=${WEBHOOK_PATH:-/webhook/hevy}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?err}
      - MAX_WEBHOOK_BODY_BYTES=${MAX_WEBHOOK_BODY_BYTES:-65536}
      - WEBHOOK_RATE_LIMIT_MAX_REQUESTS=${WEBHOOK_RATE_LIMIT_MAX_REQUESTS:-30}
      - WEBHOOK_RATE_LIMIT_WINDOW_SECONDS=${WEBHOOK_RATE_LIMIT_WINDOW_SECONDS:-60}
      - DRY_RUN=${DRY_RUN:-false}
      - MERGE_MODE=${MERGE_MODE:-true}
      - MERGE_OVERLAP_PCT=${MERGE_OVERLAP_PCT:-70}
      - MERGE_MAX_DRIFT_MIN=${MERGE_MAX_DRIFT_MIN:-20}
      - DESCRIPTION_ENABLED=${DESCRIPTION_ENABLED:-true}
      - HR_FUSION_ENABLED=${HR_FUSION_ENABLED:-true}
      - USER_WEIGHT_KG=${USER_WEIGHT_KG:-80}
      - USER_BIRTH_YEAR=${USER_BIRTH_YEAR:-1990}
      - USER_VO2MAX=${USER_VO2MAX:-45}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - config:/config
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    expose:
      - "8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddybuilds/caddy-cloudflare:latest
    pull_policy: always
    depends_on:
      - hevy-sync
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
    environment:
      - HEVY_SYNC_DOMAIN=${HEVY_SYNC_DOMAIN:?err}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:?err}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?err}
      - WEBHOOK_PATH=${WEBHOOK_PATH:-/webhook/hevy}
    ports:
      - "443:443"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    restart: unless-stopped

configs:
  caddyfile:
    content: |
      {
        email {$$LETSENCRYPT_EMAIL}
      }

      {$$HEVY_SYNC_DOMAIN} {
        tls {
          dns cloudflare {env.CLOUDFLARE_API_TOKEN}
        }

        header {
          X-Content-Type-Options nosniff
          Referrer-Policy no-referrer
        }

        @webhook {
          method POST
          path {$$WEBHOOK_PATH}
        }
        handle @webhook {
          request_body {
            max_size 64KB
          }
          reverse_proxy hevy-sync:8000
        }

        @health {
          method GET
          path /health
        }
        handle @health {
          reverse_proxy hevy-sync:8000
        }

        respond 404
      }

volumes:
  config:
  caddy_data:
  caddy_config:
